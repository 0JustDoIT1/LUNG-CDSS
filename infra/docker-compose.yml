services:
  nginx:
    build: ./nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
    expose:
      - "80"
    restart: unless-stopped

  backend:
    build:
      context: ../backend
    env_file:
      - ../backend/.env
    expose:
      - "8000"
    restart: unless-stopped
