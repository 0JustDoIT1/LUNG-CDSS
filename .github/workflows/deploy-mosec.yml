name: Deploy mosec to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - "mosec-serving/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build and push image
        run: |
          docker build --secret id=hf_token,src=<(echo "${{ secrets.HF_TOKEN }}") \
            --cache-from us-central1-docker.pkg.dev/shining-lamp-492601-f9/lung-cdss-repo/mosec:latest \
            -t us-central1-docker.pkg.dev/shining-lamp-492601-f9/lung-cdss-repo/mosec:latest \
            ./mosec-serving
          docker push us-central1-docker.pkg.dev/shining-lamp-492601-f9/lung-cdss-repo/mosec:latest
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy mosec-serving \
            --image=us-central1-docker.pkg.dev/shining-lamp-492601-f9/lung-cdss-repo/mosec:latest \
            --region=us-central1 --gpu=1 --gpu-type=nvidia-l4 --no-gpu-zonal-redundancy \
            --memory=16Gi --cpu=4 --no-cpu-throttling --port=8000 --timeout=900 \
            --min-instances=0 --max-instances=2 --no-allow-unauthenticated
